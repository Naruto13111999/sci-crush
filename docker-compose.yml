services:
  postgres:
    image: postgres:16-alpine
    container_name: sci-crush-db
    environment:
      POSTGRES_USER: scicrush
      POSTGRES_PASSWORD: scicrush
      POSTGRES_DB: scicrush
    ports:
      - "5432:5432"
    volumes:
      - sci_crush_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scicrush -d scicrush"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  sci_crush_pgdata:
